# Sveltia CMS configuration.
#
# Enum options mirror src/data/taxonomy.ts and src/content.config.ts.
# Regenerate the option lists after editing taxonomy.ts:  npm run gen:cms
# The build (astro check) is the final gate — bad values never deploy.
#
# base_url must point at your deployed sveltia-cms-auth Cloudflare Worker.
# See docs/admin-setup.md for the one-time setup steps.

backend:
  name: github
  repo: ryanw0608/HomePage
  branch: master
  base_url: https://cms-auth.wyz162536.workers.dev
  auth_endpoint: /auth

media_folder: "public/media"
public_folder: "/HomePage/media"

collections:
  - name: paper-reading
    label: "Paper Reading"
    folder: "src/content/paper-reading"
    extension: mdx
    format: frontmatter
    create: true
    editor:
      preview: false
    fields:
      - { name: title, label: Title, widget: string, hint: 'Convention: "Reading: <short name>"' }
      - { name: description, label: Description, widget: string, hint: "One sentence for SEO / share cards" }
      - { name: summary, label: Summary, widget: text, hint: "2-3 sentences shown on the index page" }
      - { name: tldr, label: "TLDR (English)", widget: string, required: false, hint: "One English sentence — required by site policy for zh notes" }
      - { name: paperTitle, label: "Paper Title", widget: string }
      - { name: authors, label: Authors, widget: list, field: { name: author, label: Author, widget: string } }
      - { name: year, label: "Paper Year", widget: number, value_type: int }
      - { name: venue, label: Venue, widget: string, required: false }
      - { name: date, label: "Review Date", widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: language, label: Language, widget: select, options: [zh, en, mixed], default: zh }
      - { name: primaryLanguage, label: "Primary Language (mixed only)", widget: select, options: [zh, en], required: false }
      # BEGIN gen:cms status(paper)
      - { name: status, label: Status, widget: select, options: [queued, reading, skimmed, reviewed, revisit], hint: "queued entries must stay draft" }
      # END gen:cms
      # BEGIN gen:cms area
      - { name: area, label: Area, widget: select, options: [machine-learning, deep-learning, systems, efficient-inference, agentic-systems, ai-for-science, frontend-engineering] }
      # END gen:cms
      # BEGIN gen:cms tags
      - name: tags
        label: Tags
        widget: list
        field: { name: tag, label: Tag, widget: select, options: [optimization, gradients, transformers, attention, reading, speculative-decoding, llm-serving, kv-cache, quantization, agents, multi-agent, tool-use, ml-for-physics, materials-science] }
      # END gen:cms
      - { name: rating, label: "Rating (1-5)", widget: number, value_type: int, min: 1, max: 5, required: false }
      - { name: recommendation, label: Recommendation, widget: select, options: [skip, skim, read, must-read], required: false }
      - { name: reproducible, label: Reproducible, widget: select, options: ["code+weights", code-only, partial, none], required: false }
      - { name: doi, label: DOI, widget: string, required: false }
      - { name: arxivId, label: "arXiv ID", widget: string, required: false }
      - { name: paperUrl, label: "Paper URL", widget: string, required: false }
      - { name: codeUrl, label: "Code URL", widget: string, required: false }
      - { name: projectUrl, label: "Project URL", widget: string, required: false }
      - { name: takeaways, label: "Key Takeaways", widget: list, required: false, field: { name: item, label: Item, widget: string } }
      - { name: featured, label: Featured, widget: boolean, default: false, required: false }
      - { name: draft, label: Draft, widget: boolean, default: true, required: false }
      - { name: math, label: "Uses Math", widget: boolean, default: true, required: false }
      - name: body
        label: Body
        widget: markdown
        # Raw mode: <Tldr>, <Critique>, <Bench>, $$ math $$ pass through untouched.
        modes: [raw]
        hint: "MDX components are written as-is; see docs/authoring.md for the catalog"

  - name: course-notes
    label: "Course Notes"
    folder: "src/content/course-notes"
    extension: mdx
    format: frontmatter
    create: true
    editor:
      preview: false
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: string }
      - { name: summary, label: Summary, widget: text }
      - { name: tldr, label: "TLDR", widget: string, required: false }
      # BEGIN gen:cms course
      - { name: course, label: Course, widget: select, options: [ml-foundations] }
      # END gen:cms
      # BEGIN gen:cms status(course)
      - { name: status, label: Status, widget: select, options: [active, complete, evergreen] }
      # END gen:cms
      - { name: term, label: Term, widget: string, required: false }
      - { name: order, label: "Order in Course", widget: number, value_type: int, required: false }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: revisit, label: "Revisit Date", widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { name: language, label: Language, widget: select, options: [zh, en, mixed], default: en }
      - { name: primaryLanguage, label: "Primary Language (mixed only)", widget: select, options: [zh, en], required: false }
      # BEGIN gen:cms areas
      - name: areas
        label: Areas
        widget: list
        required: false
        field: { name: area, label: Area, widget: select, options: [machine-learning, deep-learning, systems, efficient-inference, agentic-systems, ai-for-science, frontend-engineering] }
      # END gen:cms
      # BEGIN gen:cms tags
      - name: tags
        label: Tags
        widget: list
        field: { name: tag, label: Tag, widget: select, options: [optimization, gradients, transformers, attention, reading, speculative-decoding, llm-serving, kv-cache, quantization, agents, multi-agent, tool-use, ml-for-physics, materials-science] }
      # END gen:cms
      - { name: featured, label: Featured, widget: boolean, default: false, required: false }
      - { name: draft, label: Draft, widget: boolean, default: true, required: false }
      - { name: math, label: "Uses Math", widget: boolean, default: true, required: false }
      - name: body
        label: Body
        widget: markdown
        modes: [raw]
