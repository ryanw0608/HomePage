name: CI

# This file also hosts the GLM site agent (schedule + manual dispatch).
# It lives here rather than in its own workflow file because this repository
# refuses to register newly added workflow files (GitHub-side issue verified
# 2026-07-06; ci.yml and deploy.yml predate it and keep working). Once a new
# file registers successfully, the agent job can move back to site-agent.yml.

on:
  push:
  pull_request:
  schedule:
    - cron: "7 19 * * *" # daily overview refresh (~05:00 Sydney)
    - cron: "37 9 * * 0" # weekly digest (Sunday ~19:30 Sydney)
  workflow_dispatch:
    inputs:
      mode:
        description: "agent mode: overview | digest"
        required: true
        default: overview
        type: choice
        options: [overview, digest]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run build

  agent:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
      GLM_MODEL: ${{ vars.GLM_MODEL }}
      GLM_BASE_URL: ${{ vars.GLM_BASE_URL }}
    steps:
      - name: Skip when API key is not configured
        if: env.ZHIPU_API_KEY == ''
        run: |
          echo "ZHIPU_API_KEY secret is not set — skipping agent run."
          echo "Add it under Settings -> Secrets and variables -> Actions."

      - uses: actions/checkout@v4
        if: env.ZHIPU_API_KEY != ''

      - uses: actions/setup-node@v4
        if: env.ZHIPU_API_KEY != ''
        with:
          node-version: 24

      - name: Determine mode
        if: env.ZHIPU_API_KEY != ''
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "37 9 * * 0" ]; then
            echo "mode=digest" >> "$GITHUB_OUTPUT"
          else
            echo "mode=overview" >> "$GITHUB_OUTPUT"
          fi

      - name: Run agent
        if: env.ZHIPU_API_KEY != ''
        run: node scripts/agent/run.mjs --${{ steps.mode.outputs.mode }}

      - name: Open pull request when output changed
        if: env.ZHIPU_API_KEY != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "no changes produced — nothing to open"
            exit 0
          fi
          MODE="${{ steps.mode.outputs.mode }}"
          BRANCH="agent/${MODE}-${{ github.run_number }}"
          git config user.name "site-agent"
          git config user.email "actions@github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "agent: refresh ${MODE}"
          git push origin "$BRANCH"
          gh pr create \
            --title "agent: refresh ${MODE}" \
            --body "Automated ${MODE} update derived from the committed notes. Review before merging — merging deploys." \
            --base master \
            --head "$BRANCH"
